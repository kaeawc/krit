# Profile: balanced
#
# The krit default profile. Matches `config/default-krit.yml` exactly —
# this file exists so the onboarding flow can load every profile via
# `--config config/profiles/<name>.yml` uniformly.
#
# Derived by: extracting the current defaults as-is.
# Use when: you want krit's out-of-the-box opinions.

config:
  validation: true
  warningsAsErrors: false

comments:
  active: true
  AbsentOrWrongFileLicense:
    active: false
    licenseTemplate: 'Copyright'
    licenseTemplateIsRegex: false
  DeprecatedBlockTag:
