      - 'Preview'
      - 'SignalPreview'
      - 'DarkPreview'
      - 'LightPreview'
      - 'PreviewParameter'
      - 'PreviewLightDark'
      - 'Test'
      - 'ParameterizedTest'
  FunctionParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*'
    excludeClassPattern: '$^'
  InvalidPackageDeclaration:
    active: true
    rootPackage: ''
    requireRootInDeclaration: false
  MatchingDeclarationName:
    active: true
    mustBeFirst: true
    multiplatformTargets:
      - 'ios'
      - 'android'
      - 'js'
      - 'jvm'
      - 'native'
      - 'iosArm64'
      - 'iosX64'
      - 'macosX64'
      - 'mingwX64'
      - 'linuxX64'
  MemberNameEqualsClassName:
    active: true
    ignoreOverridden: true
  NoNameShadowing:
    active: true
  ObjectPropertyNaming:
    active: true
    constantPattern: '[A-Za-z][_A-Za-z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
    privatePropertyPattern: '(_)?[A-Za-z][_A-Za-z0-9]*'
  PackageNaming:
    active: true
    # Permissive default that allows digits and underscores in any
    # package segment (starting with a letter). Real-world Kotlin
    # packages commonly carry version suffixes like `coil3`,
    # `androidx.core2`, or `ktor3.client`.
    packagePattern: '[a-z][a-zA-Z0-9_]*(\.[a-z][a-zA-Z0-9_]*)*'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Za-z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
    privatePropertyPattern: '_?[A-Za-z][_A-Za-z0-9]*'
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
    privateVariablePattern: '(_)?[a-z][A-Za-z0-9]*'
    excludeClassPattern: '$^'
  ForbiddenClassName:
    active: false
    forbiddenName:
      - 'Manager'
      - 'Helper'
      - 'Util'
  FunctionNameMaxLength:
    active: false
    maximumFunctionNameLength: 30
  FunctionNameMinLength:
