name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read
  checks: write
  security-events: write

jobs:
  build-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Build all binaries
        run: make build
      - name: Vet
        run: make vet
      - name: Lint rules (capability-declaration gate)
        run: make lint-rules
      - name: Oracle filter fingerprint gate
        run: go run ./internal/devtools/oraclefpcheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest
      - name: Run tests
        run: gotestsum --junitfile junit-report.xml --format standard-quiet -- -count=1 ./...
      - name: Check JUnit report exists
        id: junit-exists
        if: always()
        uses: andstor/file-existence-action@v3
        with:
          files: junit-report.xml
      - name: Publish test report
        if: always() && steps.junit-exists.outputs.files_exists == 'true'
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: junit-report.xml

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Integration tests
        run: make integration

  # fanotify exercises the Linux-only watcher backend that needs
  # CAP_SYS_ADMIN (fanotify_mark) and CAP_DAC_READ_SEARCH
  # (open_by_handle_at). These tests live behind the
  # fanotify_integration build tag so `go test ./...` on a developer
  # laptop stays quiet. The runner is already Linux; we just need to
  # invoke `go test` under sudo so the test process holds the
  # required capabilities. /tmp on GHA runners is ext4, which
  # exports file handles, so FAN_MARK_FILESYSTEM is supported
  # without the Dockerfile.fanotify tmpfs gymnastics local devs need.
  fanotify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Show kernel + filesystem context
        run: |
          uname -a
          echo "fs of \$TMPDIR (/tmp):"
          stat -f -c '%T' /tmp || true
      - name: Run fanotify integration tests
        # -E preserves the Go env (GOCACHE, GOMODCACHE, etc.) set by
        # setup-go; PATH is re-exported because sudo strips it by
        # default even with -E on many distros.
        run: |
          sudo -E env "PATH=$PATH" "HOME=$HOME" \
            go test -tags fanotify_integration -count=1 -v \
            ./internal/cli/serve/ -run TestFanotify

  intellij-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: zulu
          java-version: "21"
      - name: Set Gradle User Home
        run: echo "GRADLE_USER_HOME=$HOME/.gradle/intellij-plugin" >> "$GITHUB_ENV"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-cleanup: on-success
          validate-wrappers: true
      - name: Validate IntelliJ plugin
        working-directory: editors/intellij-plugin
        run: ../../tools/krit-fir/gradlew test buildPlugin verifyPlugin --stacktrace
      - name: Upload IntelliJ plugin ZIP
        if: success()
        uses: actions/upload-artifact@de65e23aa2b7e23d713bb51fbfcb6d502f8667d8 # v4.6.2
        with:
          name: krit-intellij-plugin
          path: editors/intellij-plugin/build/distributions/*.zip
      - name: Upload IntelliJ plugin test reports
        if: failure()
        uses: actions/upload-artifact@de65e23aa2b7e23d713bb51fbfcb6d502f8667d8 # v4.6.2
        with:
          name: krit-intellij-plugin-test-reports
          path: |
            editors/intellij-plugin/build/reports/tests/test/
            editors/intellij-plugin/build/reports/pluginVerifier/

  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Regression check
        run: make regression

  external-rule-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: zulu
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-cleanup: on-success
          validate-wrappers: true
      # krit-types is the largest jar in the repo (shadow jar bundles
      # the Kotlin compiler + Analysis API). Cache the output so the
      # job doesn't pay the 2-3 minute build on every PR.
      - name: Cache krit-types shadow jar
        id: cache-krit-types
        uses: actions/cache@v4
        with:
          path: tools/krit-types/build/libs
          key: krit-types-jar-${{ hashFiles('tools/krit-types/**/*.kt', 'tools/krit-types/**/*.kts', 'tools/krit-rule-api/**/*.kt', 'tools/krit-rule-api/**/*.kts') }}
      # examples/external-rule/ resolves dev.jasonpearson.krit:krit-rule-api
      # from mavenLocal, so stage a known-version snapshot first.
      - name: Stage krit-rule-api to mavenLocal
        working-directory: tools/krit-rule-api
        run: ./gradlew --no-daemon publishToMavenLocal -PkritVersion=0.0.0-ci
      - name: Build krit-types shadow jar
        if: steps.cache-krit-types.outputs.cache-hit != 'true'
        working-directory: tools/krit-types
        run: ./gradlew --no-daemon shadowJar
      - name: Run external-rule example integration test
        env:
          KRIT_TYPES_JAR: ${{ github.workspace }}/tools/krit-types/build/libs/krit-types.jar
        run: go test ./tests/externalrule/ -count=1 -timeout 600s -v

  krit-custom-rule-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: zulu
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-cleanup: on-success
          validate-wrappers: true
      # Publish krit-rule-api to mavenLocal so the functional test in the
      # custom-rule-plugin can resolve the SPI jar with a known version.
      - name: Stage krit-rule-api to mavenLocal
        working-directory: tools/krit-rule-api
        run: ./gradlew --no-daemon publishToMavenLocal -PkritVersion=0.0.0-ci
      - name: Validate krit-custom-rule-plugin
        working-directory: krit-custom-rule-plugin
        run: ./gradlew --no-daemon test --stacktrace
      - name: Upload custom-rule-plugin test reports
        if: failure()
        uses: actions/upload-artifact@de65e23aa2b7e23d713bb51fbfcb6d502f8667d8 # v4.6.2
        with:
          name: krit-custom-rule-plugin-test-reports
          path: krit-custom-rule-plugin/build/reports/tests/test/

  krit-settings-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: zulu
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-cleanup: on-success
          validate-wrappers: true
      # The settings plugin's functional test spins up a multi-project Gradle
      # build that auto-applies `dev.jasonpearson.krit` (the host plugin).
      # `settings.gradle.kts` composite-builds `../krit-gradle-plugin`, so a
      # local checkout is sufficient — no mavenLocal staging needed.
      - name: Validate krit-settings-plugin
        working-directory: krit-settings-plugin
        run: ./gradlew --no-daemon test --stacktrace
      - name: Upload settings-plugin test reports
        if: failure()
        uses: actions/upload-artifact@de65e23aa2b7e23d713bb51fbfcb6d502f8667d8 # v4.6.2
        with:
          name: krit-settings-plugin-test-reports
          path: krit-settings-plugin/build/reports/tests/test/

  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run golangci-lint
        run: golangci-lint run ./...
      - name: Run gosec
        # Excluded rules:
        #   G103 — unsafe.Pointer is used intentionally (audited) for intern-table perf
        #   G104 — best-effort cleanup (os.Remove etc.) is documented and intentional
        #   G115 — integer-overflow conversions are bounded by upstream invariants
        #   G122 — filepath.Walk callbacks scan trusted local project trees
        #   G204 — Krit shells out to git/gradle/javac/etc. by design
        #   G301/G302/G306 — caches, scratch dirs, and reports are user-readable by design
        #   G304 — vfs/fsutil/cacheutil take filesystem paths as input by design
        #   G404 — non-cryptographic randomness is used for sampling/jitter only
        #   G602 — false positive on byte conversion of UintN(256)
        #   G703 — same path-as-input rationale as G304
        #   G704 — HTTP clients accept caller-supplied URLs by design
        run: gosec -exclude=G103,G104,G115,G122,G204,G301,G302,G304,G306,G404,G602,G703,G704 -fmt=junit-xml -out=gosec-report.xml -stdout ./...
      - name: Check gosec report exists
        id: gosec-exists
        if: always()
        uses: andstor/file-existence-action@v3
        with:
          files: gosec-report.xml
      - name: Publish security report
        if: always() && steps.gosec-exists.outputs.files_exists == 'true'
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: gosec-report.xml

  krit-lint-sarif:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Build and self-lint
        run: bash scripts/self-lint.sh
      - name: Upload SARIF
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          sarif_file: results.sarif
          category: krit-self-lint
