name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # Per-goos matrix: each runner natively builds its OS's targets via
  # goreleaser, producing dist/ with archives + checksums + signatures.
  # We --skip=publish here; the funnel job handles GitHub release create,
  # the brew cask, and the scoop manifest.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            ids: krit-linux,krit-lsp-linux,krit-mcp-linux,krit-linux-musl,krit-lsp-linux-musl,krit-mcp-linux-musl
          - os: macos-latest
            goos: darwin
            ids: krit-darwin,krit-lsp-darwin,krit-mcp-darwin
          - os: windows-latest
            goos: windows
            ids: krit-windows,krit-lsp-windows,krit-mcp-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with: { go-version-file: go.mod }

      # Linux cross-compilation uses zig cc for both arm64-glibc and
      # amd64-musl targets. Ubuntu's gcc-aarch64-linux-gnu and
      # musl-tools have well-known sysroot/library issues with cgo;
      # zig bundles glibc + musl + sysroots in one binary and is the
      # standard escape hatch. Install once and write per-target
      # wrapper scripts on PATH so .goreleaser.yml can reference plain
      # CC values.
      - if: matrix.goos == 'linux'
        name: Install zig + cross-cc wrappers
        run: |
          set -euo pipefail
          ZIG_VERSION=0.13.0
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" \
            | sudo tar -xJ -C /opt
          sudo ln -sf "/opt/zig-linux-x86_64-${ZIG_VERSION}/zig" /usr/local/bin/zig
          for target in glibc-arm64:aarch64-linux-gnu musl-amd64:x86_64-linux-musl; do
            name="${target%:*}"
            zig_target="${target##*:}"
            sudo tee "/usr/local/bin/zigcc-${name}" > /dev/null <<EOF
          #!/usr/bin/env bash
          exec zig cc -target ${zig_target} "\$@"
          EOF
            sudo chmod +x "/usr/local/bin/zigcc-${name}"
          done
          zig version
          zigcc-glibc-arm64 --version | head -1
          zigcc-musl-amd64 --version | head -1

      # Import the release signing subkey for goreleaser's signs: block.
      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: ${{ secrets.GPG_FINGERPRINT }}

      # Install syft so goreleaser's sboms: block can run. None of the
      # GitHub-hosted runners ship syft preinstalled. anchore/sbom-action
      # downloads the right binary for the current OS/arch.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      # `goreleaser release` doesn't accept --id filters (build-only flag),
      # so we filter the config down to this matrix entry's ids before
      # invoking it. See scripts/release/filter-goreleaser-config.py.
      # actions/setup-python provides an isolated Python without
      # PEP 668's externally-managed-environment guard.
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
      # Write the filtered config to RUNNER_TEMP rather than the repo
      # working tree — goreleaser refuses to release with untracked
      # files present.
      - name: Filter goreleaser config to current OS
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml
          python3 scripts/release/filter-goreleaser-config.py "${{ matrix.ids }}" > "$RUNNER_TEMP/goreleaser-${{ matrix.goos }}.yml"
      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: '~> v2'
          args: release --config ${{ runner.temp }}/goreleaser-${{ matrix.goos }}.yml --clean --skip=publish --skip=announce
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # Upload everything except the per-goos checksums/sigs — the
      # funnel produces a unified set covering all platforms.
      - name: Stage uploadable artifacts
        shell: bash
        run: |
          mkdir staged
          # Goreleaser names SBOMs as <archive>.sbom.json. Glob both
          # explicitly so we don't pick up goreleaser's internal
          # metadata.json / artifacts.json by accident.
          for pat in '*.tar.gz' '*.zip' '*.sbom.json'; do
            cp dist/$pat staged/ 2>/dev/null || true
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: dist-${{ matrix.goos }}
          path: staged/
          retention-days: 1
          if-no-files-found: error

  # Build the JVM sidecar (krit-types shaded jar) once and stage it for
  # the release funnel. The Go CLI auto-downloads this asset on first
  # use of --daemon / --custom-rule-jars; see internal/oracle.EnsureJar.
  build-krit-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 0 }
      - uses: actions/setup-java@3a4f6e1af504cf6a31855fa4c52c5c265c3b610f # v4.7.1
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b # v4.3.0
      - name: Build krit-types shaded jar
        working-directory: tools/krit-types
        run: ./gradlew --no-daemon shadowJar
      - name: Stage jar with release-tagged name
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir staged
          cp tools/krit-types/build/libs/krit-types.jar "staged/krit-types-${TAG}.jar"
          ls -la staged/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: dist-krit-types
          path: staged/
          retention-days: 1
          if-no-files-found: error

  # Funnel: gather every matrix runner's archives, generate one combined
  # checksums.txt covering all platforms, sign it, create the GitHub
  # release, and push the brew cask + scoop manifest to their tap repos.
  release:
    needs: [build, build-krit-types]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 0 }

      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: ${{ secrets.GPG_FINGERPRINT }}

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: staging
          pattern: dist-*
          merge-multiple: true

      - name: Assemble dist/
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          cp staging/*.tar.gz staging/*.zip dist/ 2>/dev/null || true
          cp staging/*.sbom.json dist/ 2>/dev/null || true
          cp staging/*.jar dist/ 2>/dev/null || true
          ls -la dist/

      - name: Generate combined checksums.txt
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          : > checksums.txt
          for f in *.tar.gz *.zip *.jar; do
            [ -f "$f" ] || continue
            sha256sum "$f" >> checksums.txt
          done
          sort -k2 checksums.txt -o checksums.txt
          cat checksums.txt

      - name: Sign combined checksums.txt
        shell: bash
        env:
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          cd dist
          echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode=loopback \
            --passphrase-fd 0 --local-user "$GPG_FINGERPRINT" \
            --output checksums.txt.sig --detach-sign checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd dist
          # shellcheck disable=SC2046
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            $(ls *.tar.gz *.zip *.jar *.sbom.json checksums.txt checksums.txt.sig 2>/dev/null)

      - name: Publish Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: bash scripts/release/update-brew-tap.sh

      - name: Publish Scoop manifest
        env:
          GH_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: bash scripts/release/update-scoop-bucket.sh

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'dist/*.tar.gz,dist/*.zip'
