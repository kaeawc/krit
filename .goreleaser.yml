version: 2
project_name: krit

# Releases are built via the matrix-funnel workflow in
# .github/workflows/release.yml: each goos's matrix runner invokes
# `goreleaser release --skip=publish,announce --id <ids-for-its-goos>`,
# producing per-target archives, checksums, and signatures. The funnel
# job downloads all dist/ outputs, merges checksums, re-signs the
# combined checksum file, and hand-rolls the GitHub release create plus
# the brew cask and scoop manifest commits to their respective tap repos.
# That's why this config has neither a homebrew_casks nor scoops block,
# and skips a release.github block — those publishers are driven by the
# workflow rather than goreleaser.

before:
  hooks:
    - go mod tidy
    - go vet ./...

# Build ids are split by goos so the matrix can filter via --id flags.
builds:
  # --- Linux / glibc ---------------------------------------------------------
  # arm64 cross-compilation needs gcc-aarch64-linux-gnu installed on the
  # ubuntu runner; the workflow does that. The amd64 build uses the
  # default gcc.
  - id: krit-linux
    main: ./cmd/krit
    binary: krit
    env: [CGO_ENABLED=1]
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [linux]
    goarch: [amd64]
    # arm64-linux is disabled — aarch64-linux-gnu-gcc + cgo on
    # ubuntu-24.04 picks up the host's /usr/include instead of the
    # arm64 sysroot and fails on bits/libc-header-start.h. Tracked as
    # a follow-up; needs sysroot configuration or zig-cc.
  - id: krit-lsp-linux
    main: ./cmd/krit-lsp
    binary: krit-lsp
    env: [CGO_ENABLED=1]
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [linux]
    goarch: [amd64]
    # arm64-linux is disabled — aarch64-linux-gnu-gcc + cgo on
    # ubuntu-24.04 picks up the host's /usr/include instead of the
    # arm64 sysroot and fails on bits/libc-header-start.h. Tracked as
    # a follow-up; needs sysroot configuration or zig-cc.
  - id: krit-mcp-linux
    main: ./cmd/krit-mcp
    binary: krit-mcp
    env: [CGO_ENABLED=1]
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [linux]
    goarch: [amd64]
    # arm64-linux is disabled — aarch64-linux-gnu-gcc + cgo on
    # ubuntu-24.04 picks up the host's /usr/include instead of the
    # arm64 sysroot and fails on bits/libc-header-start.h. Tracked as
    # a follow-up; needs sysroot configuration or zig-cc.

  # --- Linux / musl ----------------------------------------------------------
  # Disabled for now: ubuntu-24.04's musl-tools wrapper falls back to
  # glibc headers when cgo invokes it through go build, producing
  # `fatal error: bits/libc-header-start.h` from /usr/include/stdlib.h.
  # Fix is to install a proper musl-cross toolchain (musl-cross-make,
  # `apk add` style) on the runner and pass through CC properly. Tracked
  # as a follow-up.

  # --- Darwin ----------------------------------------------------------------
  # Built on a macos-latest runner (Apple Silicon / arm64). Cross-compiles
  # to amd64 via Apple clang's `-arch x86_64`; both SDKs ship in Xcode.
  - id: krit-darwin
    main: ./cmd/krit
    binary: krit
    env: [CGO_ENABLED=1]
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [darwin]
    goarch: [amd64, arm64]
  - id: krit-lsp-darwin
    main: ./cmd/krit-lsp
    binary: krit-lsp
    env: [CGO_ENABLED=1]
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [darwin]
    goarch: [amd64, arm64]
  - id: krit-mcp-darwin
    main: ./cmd/krit-mcp
    binary: krit-mcp
    env: [CGO_ENABLED=1]
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [darwin]
    goarch: [amd64, arm64]

  # --- Windows ---------------------------------------------------------------
  # amd64 only; arm64 windows builds aren't shipped (uncommon target,
  # would need additional toolchain).
  - id: krit-windows
    main: ./cmd/krit
    binary: krit
    env: [CGO_ENABLED=1]
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [windows]
    goarch: [amd64]
  - id: krit-lsp-windows
    main: ./cmd/krit-lsp
    binary: krit-lsp
    env: [CGO_ENABLED=1]
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [windows]
    goarch: [amd64]
  - id: krit-mcp-windows
    main: ./cmd/krit-mcp
    binary: krit-mcp
    env: [CGO_ENABLED=1]
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [windows]
    goarch: [amd64]

archives:
  - id: default
    ids:
      - krit-linux
      - krit-lsp-linux
      - krit-mcp-linux
      - krit-darwin
      - krit-lsp-darwin
      - krit-mcp-darwin
      - krit-windows
      - krit-lsp-windows
      - krit-mcp-windows
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: 'checksums.txt'

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--pinentry-mode=loopback"
      - "--passphrase"
      - "{{ .Env.GPG_PASSPHRASE }}"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

# goreleaser invokes `syft` to catalog each archive into an SBOM.
# The release workflow installs syft via anchore/sbom-action before
# invoking goreleaser on each runner.
sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
