version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - noctx
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    errcheck:
      # Best-effort APIs whose return values are intentionally ignored:
      # - Process.Kill / Process.Signal: cleanup before fatal-return; the
      #   process may already be dead and we're returning an error anyway.
      # - hash.Hash.Write: documented to never return an error.
      exclude-functions:
        - (*os.Process).Kill
        - (*os.Process).Signal
        - (hash.Hash).Write
    errorlint:
      errorf: true
    gocyclo:
      # 20 is a deliberate compromise between 10 (default; too strict for
      # Go switch-heavy code) and silence. At 10 Krit's rule registries,
      # the LSP/MCP method dispatchers, and Android XML walkers all flag
      # — most of those are flat case-tables, not genuine complexity
      # hotspots. 20 trims the lowest-signal ~80% of the backlog while
      # still catching real branch-heavy functions (the worst offender
      # today is 149, far above any sane bar). Registry files are further
      # excluded below since v2.Register call lists score artificially high.
      min-complexity: 20
    govet:
      disable:
        - fieldalignment
        - shadow
    gosec:
      excludes:
        - G104  # best-effort cleanup is intentional
        - G107  # caller-supplied URLs are by-design (lint-catalog, httpx)
        - G115  # integer-overflow conversions are bounded by upstream invariants
        - G204  # Krit shells out to git/gradle/javac/etc. by design
        - G301  # directory permissions intentional for project dirs
        - G302  # file permissions intentional
        - G306  # WriteFile permissions intentional
        - G404  # weak random is acceptable for non-security uses
        - G122  # filepath.Walk callbacks scan trusted local project trees
        - G304  # path is caller input by design (vfs/fsutil/cacheutil)
        - G602  # false positive on UintN(256) → byte
        - G703  # same path-as-input rationale as G304
        - G704  # httpx URL is caller input by design
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gocyclo
          - gosec
          - noctx
          - revive
          - unconvert
          - unparam
        path: _test\.go
      # SA5011: staticcheck doesn't model t.Fatal/t.Fatalf as stopping
      # execution, so `if x == nil { t.Fatal(...) }; x.Field` always fires.
      - linters:
          - staticcheck
        text: "SA5011"
        path: "_test\\.go|oracletest/"
      # Rule registries call v2.Register(...) many times; cyclomatic complexity
      # tracks branches not list length, so these score high artifically.
      - linters:
          - gocyclo
        path: internal/rules/registry_
      # Krit's Android-manifest typo-detection rule deliberately encodes
      # common misspellings (aplication, reciever, sevice, etc.) as data.
      - linters:
          - misspell
        path: internal/rules/android_manifest_(structure|test)\.go
      # Rule-registry files are flat tables of v2.Register(&v2.Rule{...})
      # calls. gocyclo counts every case branch and inline predicate —
      # functions like registerComplexityRules score 149 not because they
      # are complex but because they enumerate ~150 rules. Splitting them
      # would just spread the same code across more functions without
      # reducing actual cognitive load. Keep gocyclo's signal for the
      # (much smaller) set of genuinely branch-heavy functions elsewhere.
      - linters:
          - gocyclo
        path: internal/rules/registry_.*\.go
      # Rule implementation functions perform multi-branch AST analysis by
      # design — each condition guards a distinct syntactic edge case.
      # Raise the effective threshold to 30 for this package by suppressing
      # the 21–29 band that fires on legitimate analysis helpers.
      - linters:
          - gocyclo
        path: internal/rules/
        text: "cyclomatic complexity 2[1-9] "
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
