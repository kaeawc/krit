  DocumentationOverPrivateFunction:
    active: false
  DocumentationOverPrivateProperty:
    active: false
  EndOfSentenceFormat:
    active: false
    endOfSentenceFormat: '([.?!][ \t\n\r])|([.?!]$)'
  KDocReferencesNonPublicProperty:
    active: false
  OutdatedDocumentation:
    active: false
    matchTypeParameters: false
    matchDeclarationsOrder: false
  UndocumentedPublicClass:
