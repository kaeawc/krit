name: Publish krit-rule-api

# Publishes dev.jasonpearson.krit:krit-rule-api to Maven Central
# (Sonatype Central Portal) on every v* tag, alongside the binary
# release in release.yml. Uses the vanniktech maven-publish-plugin
# with automaticRelease=true — staged artifacts are promoted by
# Central automatically once validation passes.
#
# workflow_dispatch is also wired up so a maintainer can republish a
# specific version (e.g. after a Central staging rejection) without
# cutting a new git tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v). Defaults to the current tag.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: zulu
          java-version: '21'

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-cleanup: on-success
          validate-wrappers: true

      # Derive the artifact version from the tag (vX.Y.Z → X.Y.Z) or
      # the manual-dispatch input. Fail closed if neither is present
      # so we never publish an accidental 0.0.0-SNAPSHOT as a release.
      - name: Resolve publish version
        id: version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -n "${DISPATCH_VERSION:-}" ]; then
            ver="${DISPATCH_VERSION}"
          elif [[ "${GITHUB_REF_TYPE:-}" = "tag" ]] && [[ "${GITHUB_REF_NAME}" =~ ^v ]]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            echo "::error::No version available — workflow_dispatch needs an input and push must be a v* tag"
            exit 1
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Publishing krit-rule-api version: ${ver}"

      # Vanniktech maven-publish-plugin reads ORG_GRADLE_PROJECT_* env vars
      # as Gradle properties. mavenCentralAutomaticPublishing=true in
      # gradle.properties means Central promotes the staged release
      # without manual UI clicks once it passes validation.
      - name: Publish to Maven Central
        working-directory: tools/krit-rule-api
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          ./gradlew --no-daemon --no-configuration-cache publish \
            -PVERSION_NAME=${{ steps.version.outputs.version }}
