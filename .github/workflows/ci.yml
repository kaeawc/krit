name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build all binaries
        run: make build

      - name: Vet
        run: make vet

      - name: Lint rules (capability-declaration gate)
        run: make lint-rules

      - name: Test
        run: make test

      - name: Oracle filter fingerprint gate
        run: python3 tools/oracle_fingerprint_check.py

      - name: Integration tests
        run: make integration

      - name: Regression check
        run: make regression
