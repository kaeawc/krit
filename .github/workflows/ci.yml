name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Build all binaries
        run: make build

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Integration tests
        run: make integration

      - name: Regression check
        run: make regression
