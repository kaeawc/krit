name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build all binaries
        run: make build

      - name: Vet
        run: make vet

      - name: Lint rules (capability-declaration gate)
        run: make lint-rules

      - name: Test
        run: make test

      - name: Oracle filter fingerprint gate
        run: python3 tools/oracle_fingerprint_check.py

      - name: Integration tests
        run: make integration

      - name: Regression check
        run: make regression
